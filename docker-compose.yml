services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teachview_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teachview_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/teachview_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      # Меняем validate на update, чтобы приложение само создавало/обновляло таблицы при старте:
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: teachview-videos
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 2GB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 2GB
      TRANSCRIPTION_OUTPUT_DIR: /app/transcription_output
      JWT_SECRET: ${JWT_SECRET:-teachview-super-secret-key-minimum-32-chars-long}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-604800000}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  uploads:
